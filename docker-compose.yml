version: "3.9"

services:

  # ── PostgreSQL Database ──
  db:
    image: postgres:15
    container_name: face_attendance_db
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists across restarts
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Flask App ──
  app:
    build: .
    container_name: face_attendance_app
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DB_HOST: db        # ← points to the db service above, not localhost
    depends_on:
      db:
        condition: service_healthy   # waits for PostgreSQL to be ready
    volumes:
      - .:/app           # live reload — code changes reflect immediately

volumes:
  postgres_data:         # named volume so data survives container restarts
