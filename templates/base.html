<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}FaceTrack{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary:       #111111;
            --primary-hover: #333333;
            --accent:        #111111;
            --success:       #16a34a;
            --warning:       #d97706;
            --danger:        #dc2626;
            --surface:       #ffffff;
            --surface-2:     #fafafa;
            --surface-3:     #f4f4f5;
            --border:        #e4e4e7;
            --border-dark:   #d1d1d6;
            --text-1:        #111111;
            --text-2:        #52525b;
            --text-3:        #a1a1aa;
            --radius:        10px;
            --radius-lg:     14px;
            --shadow:        0 1px 2px rgba(0,0,0,.05);
            --shadow-md:     0 4px 12px rgba(0,0,0,.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--surface-2);
            color: var(--text-1);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Navbar ── */
        .topnav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 58px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 9px;
            text-decoration: none;
            margin-right: 36px;
        }

        .brand-logo {
            width: 32px; height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-1);
            letter-spacing: -.3px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 7px;
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-2);
            text-decoration: none;
            transition: all .15s;
            white-space: nowrap;
        }

        .nav-link:hover {
            background: var(--surface-3);
            color: var(--text-1);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
        }

        .nav-link i { font-size: 12px; }

        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .clock-badge {
            font-size: 12px;
            color: var(--text-3);
            font-weight: 500;
            background: var(--surface-3);
            padding: 5px 11px;
            border-radius: 99px;
            border: 1px solid var(--border);
            letter-spacing: .1px;
        }

        .online-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            color: var(--success);
            background: #f0fdf4;
            padding: 5px 11px;
            border-radius: 99px;
            border: 1px solid #bbf7d0;
        }

        .online-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: .3; }
        }

        /* ── Page ── */
        .page-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 24px;
        }

        /* ── Page Header ── */
        .page-header {
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.5px;
            color: var(--text-1);
        }

        .page-header p {
            font-size: 13.5px;
            color: var(--text-3);
            margin-top: 3px;
        }

        /* ── Stat Cards ── */
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 22px;
            box-shadow: var(--shadow);
            transition: all .2s;
        }

        .stat-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-dark);
        }

        .stat-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            margin-bottom: 14px;
            background: var(--surface-3);
            color: var(--text-1);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1;
            margin-bottom: 5px;
            color: var(--text-1);
        }

        .stat-label {
            font-size: 12.5px;
            color: var(--text-3);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        /* ── Table Card ── */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-card-head {
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-1);
        }

        .table { margin: 0; }

        .table thead th {
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--text-3);
            padding: 11px 20px;
        }

        .table tbody td {
            padding: 13px 20px;
            font-size: 13.5px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            color: var(--text-2);
        }

        .table tbody tr:last-child td { border-bottom: none; }
        .table tbody tr:hover { background: var(--surface-2); }

        /* ── Status Pills ── */
        .pill {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: .1px;
        }

        .pill-green  { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .pill-yellow { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
        .pill-red    { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .pill-gray   { background: var(--surface-3); color: var(--text-2); border: 1px solid var(--border); }

        /* ── Buttons ── */
        .btn-primary-app {
            background: var(--primary);
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
            transition: all .15s;
            font-family: inherit;
            letter-spacing: -.1px;
        }

        .btn-primary-app:hover {
            background: var(--primary-hover);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,0,0,.15);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
            transition: all .15s;
            font-family: inherit;
        }

        .btn-ghost:hover {
            background: var(--surface-3);
            color: var(--text-1);
            border-color: var(--border-dark);
        }

        .btn-danger-soft {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
            padding: 6px 13px;
            border-radius: 7px;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            font-family: inherit;
        }

        .btn-danger-soft:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        /* ── Forms ── */
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 5px;
            display: block;
        }

        .form-control, .form-select {
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 13.5px;
            padding: 9px 13px;
            width: 100%;
            color: var(--text-1);
            background: var(--surface);
            font-family: inherit;
            transition: border-color .15s, box-shadow .15s;
            outline: none;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,0,0,.06);
        }

        .form-control::placeholder { color: var(--text-3); }

        /* ── Avatar ── */
        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--surface-3);
            color: var(--text-1);
            font-size: 12px;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        /* ── Fade in ── */
        .fade-up {
            animation: fadeUp .3s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 4px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- ── Navbar ── -->
<nav class="topnav">
    <a href="/" class="nav-brand">
        <div class="brand-logo"><i class="fa-solid fa-user-check"></i></div>
        <span class="brand-name">FaceTrack</span>
    </a>

    <div class="nav-links">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
            <i class="fa-solid fa-gauge-high"></i> Dashboard
        </a>
        <a href="/attendance" class="nav-link {% if request.path == '/attendance' %}active{% endif %}">
            <i class="fa-solid fa-circle-dot"></i> Live Attendance
        </a>
        <a href="/register" class="nav-link {% if request.path == '/register' %}active{% endif %}">
            <i class="fa-solid fa-user-plus"></i> Register
        </a>
        <a href="/persons" class="nav-link {% if request.path == '/persons' %}active{% endif %}">
            <i class="fa-solid fa-users"></i> Persons
        </a>
        <a href="/records" class="nav-link {% if request.path == '/records' %}active{% endif %}">
            <i class="fa-solid fa-table-list"></i> Records
        </a>
    </div>

    <div class="nav-right">
        <div class="clock-badge" id="liveClock"></div>
        <div class="online-pill">
            <div class="online-dot"></div> Online
        </div>
    </div>
</nav>

<!-- ── Content ── -->
<div class="page-wrap fade-up">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function tick() {
        const now = new Date();
        document.getElementById('liveClock').textContent =
            now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) +
            ' · ' + now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
    }
    tick(); setInterval(tick, 1000);
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
