<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live Attendance - Face Recognition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        #video { border: 5px solid #28a745; border-radius: 12px; width: 100%; max-width: 720px; }
        .log-table { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body class="p-4">
<div class="container-fluid">
    <h2 class="mb-4 text-center">📍 Live Attendance Mode</h2>

    <div class="row">
        <!-- Webcam Feed -->
        <div class="col-lg-8 text-center">
            <div class="mb-3">
                <button id="startBtn" class="btn btn-success btn-lg px-5">▶ Start Attendance Session</button>
                <button id="stopBtn" class="btn btn-danger btn-lg px-5 ms-3 d-none">⏹ Stop Session</button>
            </div>

            <video id="video" autoplay playsinline></video>
            
            <div class="mt-3 text-muted">
                Green box = Recognized | Red box = Unknown
            </div>
        </div>

        <!-- Real-time Attendance Log -->
        <div class="col-lg-4">
            <h5 class="mb-3">📋 Today's Attendance Log</h5>
            <div class="log-table border rounded bg-white p-2" id="logContainer">
                <table class="table table-sm table-hover" id="attendanceTable">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th>Conf.</th>
                        </tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let stream = null;
    let intervalId = null;
    const video = document.getElementById('video');

    // Start Session
    document.getElementById('startBtn').addEventListener('click', async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;

            document.getElementById('startBtn').classList.add('d-none');
            document.getElementById('stopBtn').classList.remove('d-none');

            // Load embeddings into memory cache
            await fetch('/load_embeddings', { method: 'POST' });

            // Start processing frames
            intervalId = setInterval(processFrame, 300); // process every ~300ms (~3 fps)
        } catch (err) {
            alert("Cannot access webcam. Please allow camera permission.");
        }
    });

    // Stop Session
    document.getElementById('stopBtn').addEventListener('click', () => {
        clearInterval(intervalId);
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
        document.getElementById('startBtn').classList.remove('d-none');
        document.getElementById('stopBtn').classList.add('d-none');
    });

    async function processFrame() {
        if (!video.videoWidth) return;

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const base64 = canvas.toDataURL('image/jpeg', 0.8);

        const res = await fetch('/process_frame', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64 })
        });

        const data = await res.json();

        if (data.detections) {
            // Draw boxes on video (we'll do this client-side for speed)
            // For now we just update the log
            updateLog(data.detections);
        }
    }

    function updateLog(detections) {
        const tbody = document.getElementById('logBody');
        detections.forEach(det => {
            if (det.name !== "Unknown") {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${det.name}</strong></td>
                    <td>${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                    <td><span class="badge bg-success">${det.status}</span></td>
                    <td>${det.confidence}</td>
                `;
                tbody.prepend(row);

                // Keep only last 15 rows
                if (tbody.children.length > 15) tbody.removeChild(tbody.lastChild);
            }
        });
    }
</script>
</body>
</html>
