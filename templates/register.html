<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register New Person - Face Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .video-container { position: relative; display: inline-block; }
        #video { border: 5px solid #0d6efd; border-radius: 12px; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <h2 class="mb-4 text-center">📸 Register New Person</h2>

            <!-- Registration Form -->
            <form id="registerForm">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Employee ID</label>
                        <input type="text" id="employee_id" class="form-control" placeholder="EMP001" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Department</label>
                        <input type="text" id="department" class="form-control" placeholder="IT / HR / Finance" required>
                    </div>
                </div>

                <button type="submit" id="startBtn" class="btn btn-success btn-lg mt-4 w-100">
                    🚀 Start Registration (Capture 20 Photos)
                </button>
            </form>

            <!-- Webcam + Progress Section -->
            <div id="webcamSection" class="mt-5 d-none text-center">
                <div class="video-container mx-auto">
                    <video id="video" width="640" height="480" autoplay playsinline></video>
                </div>

                <div class="progress mt-4" style="height: 25px;">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" 
                         style="width: 0%;">0 / 20 photos</div>
                </div>
                
                <p id="status" class="mt-3 text-info fw-bold">
                    Keep your face steady and look at the camera
                </p>

                <!-- Cancel Button -->
                <button id="cancelBtn" class="btn btn-danger mt-3 px-5">
                    ❌ Cancel Registration
                </button>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="alert alert-success mt-4 d-none text-center">
                <h4>🎉 Registration Completed Successfully!</h4>
                <p class="mb-0">Person and averaged embedding saved.</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="alert alert-danger mt-4 d-none"></div>
        </div>
    </div>
</div>

<script>
    let stream = null;
    const video = document.getElementById('video');
    let captured = 0;
    const TOTAL_PHOTOS = 20;
    let currentEmployeeId = null;

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const name = document.getElementById('name').value.trim();
        const employee_id = document.getElementById('employee_id').value.trim();
        const department = document.getElementById('department').value.trim();

        if (!name || !employee_id || !department) {
            alert("Please fill in all fields");
            return;
        }

        currentEmployeeId = employee_id;

        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            document.getElementById('webcamSection').classList.remove('d-none');
            document.getElementById('startBtn').disabled = true;

            captured = 0;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressBar').textContent = `0 / ${TOTAL_PHOTOS} photos`;

            captureLoop(name, employee_id, department);
        } catch (err) {
            alert("Cannot access webcam. Please allow camera permission.");
        }
    });

    // Cancel Button
    document.getElementById('cancelBtn').addEventListener('click', async function() {
        if (confirm("Are you sure you want to cancel registration? All progress will be lost.")) {
            stopWebcam();
            await fetch('/cancel_registration', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ employee_id: currentEmployeeId })
            });
            location.reload();   // Reset the page
        }
    });

    async function captureLoop(name, employee_id, department) {
        while (captured < TOTAL_PHOTOS) {
            await new Promise(resolve => setTimeout(resolve, 180));

            const canvas = document.createElement('canvas');
            canvas.width = 640; canvas.height = 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);

            const base64 = canvas.toDataURL('image/jpeg', 0.85);

            const res = await fetch('/register_capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64, name, employee_id, department })
            });

            const data = await res.json();

            if (data.status === 'error') {
                document.getElementById('errorMessage').classList.remove('d-none');
                document.getElementById('errorMessage').innerHTML = `<strong>Error:</strong> ${data.message}`;
                stopWebcam();
                return;
            }

            captured = data.captured || captured + 1;
            const percent = Math.round((captured / TOTAL_PHOTOS) * 100);
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressBar').textContent = `${captured} / ${TOTAL_PHOTOS} photos`;
        }

        stopWebcam();
        document.getElementById('successMessage').classList.remove('d-none');
    }

    function stopWebcam() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
    }
</script>
</body>
</html>
