<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register New Person - Face Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        #video { border: 5px solid #0d6efd; border-radius: 12px; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <h2 class="mb-4 text-center">📸 Register New Person</h2>

            <!-- Form -->
            <form id="registerForm">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Employee ID</label>
                        <input type="text" id="employee_id" class="form-control" placeholder="EMP001" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Department</label>
                        <input type="text" id="department" class="form-control" placeholder="IT / HR / Finance" required>
                    </div>
                </div>
                <button type="submit" id="startBtn" class="btn btn-success btn-lg mt-4 w-100">
                    🚀 Start Registration (Capture 20 Photos)
                </button>
            </form>

            <!-- Webcam Section -->
            <div id="webcamSection" class="mt-5 d-none text-center">
                <video id="video" width="640" height="480" autoplay playsinline></video>

                <div class="progress mt-4" style="height: 25px;">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                         style="width: 0%;">0 / 20 photos</div>
                </div>

                <p id="statusMsg" class="mt-3 text-info fw-bold">
                    Keep your face steady and look at the camera...
                </p>

                <button id="cancelBtn" class="btn btn-danger mt-3 px-5">
                    ❌ Cancel Registration
                </button>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="alert alert-success mt-4 d-none text-center">
                <h4>🎉 Registration Completed!</h4>
                <p>Face data saved successfully.</p>
                <a href="/persons" class="btn btn-primary">View Registered Persons</a>
                <a href="/register" class="btn btn-outline-success ms-2">Register Another</a>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="alert alert-danger mt-4 d-none"></div>
        </div>
    </div>
</div>

<script>
    let stream = null;
    let capturing = false;
    let currentEmployeeId = null;
    const TOTAL_PHOTOS = 20;
    const video = document.getElementById('video');

    // ── Start Registration ──
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const name = document.getElementById('name').value.trim();
        const employee_id = document.getElementById('employee_id').value.trim();
        const department = document.getElementById('department').value.trim();

        if (!name || !employee_id || !department) {
            alert("Please fill in all fields");
            return;
        }

        currentEmployeeId = employee_id;

        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;

            document.getElementById('webcamSection').classList.remove('d-none');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('errorMessage').classList.add('d-none');

            capturing = true;
            captureLoop(name, employee_id, department);

        } catch (err) {
            showError("Cannot access webcam. Please allow camera permission.");
        }
    });

    // ── Cancel Button ──
    document.getElementById('cancelBtn').addEventListener('click', async function() {
        if (confirm("Cancel registration? All progress will be lost.")) {
            capturing = false;
            stopWebcam();
            await fetch('/cancel_registration', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ employee_id: currentEmployeeId })
            });
            location.reload();
        }
    });

    // ── Capture Loop ──
    async function captureLoop(name, employee_id, department) {
        let captured = 0;

        while (capturing && captured < TOTAL_PHOTOS) {
            // Wait 200ms between each capture
            await new Promise(resolve => setTimeout(resolve, 200));

            // Draw frame to canvas
            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            const base64 = canvas.toDataURL('image/jpeg', 0.85);

            // Send to Flask
            let res, data;
            try {
                res = await fetch('/register_capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64, name, employee_id, department })
                });
                data = await res.json();
            } catch (err) {
                showError("Network error. Please try again.");
                stopWebcam();
                return;
            }

            // ── Handle server response ──
            if (data.status === 'success') {
                // Registration complete!
                stopWebcam();
                document.getElementById('webcamSection').classList.add('d-none');
                document.getElementById('successMessage').classList.remove('d-none');
                return;
            }

            if (data.status === 'error') {
                showError(data.message);
                stopWebcam();
                return;
            }

            if (data.status === 'no_face') {
                // No face detected — skip this frame, don't count it
                document.getElementById('statusMsg').textContent =
                    "⚠️ No face detected — please face the camera!";
                continue;
            }

            if (data.status === 'capturing') {
                captured = data.captured;
                const percent = Math.round((captured / TOTAL_PHOTOS) * 100);
                document.getElementById('progressBar').style.width = `${percent}%`;
                document.getElementById('progressBar').textContent = `${captured} / ${TOTAL_PHOTOS} photos`;
                document.getElementById('statusMsg').textContent =
                    `📸 Capturing... ${captured} of ${TOTAL_PHOTOS} photos done`;
            }
        }
    }

    // ── Helpers ──
    function stopWebcam() {
        capturing = false;
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMessage');
        el.classList.remove('d-none');
        el.innerHTML = `<strong>❌ Error:</strong> ${msg}`;
        document.getElementById('startBtn').disabled = false;
    }
</script>
</body>
</html>
